<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#BDB5A6"/>
  
  <!-- Ground shadow -->
  <ellipse cx="300" cy="265" rx="144" ry="10" fill="#ada698" opacity="0.4"/>
  
  <!-- House body -->
  <rect x="140" y="145" width="320" height="110" fill="#9a9488"/>
  
  <!-- Side posts -->
  <rect x="140" y="145" width="8" height="110" fill="#3A4A56" opacity="0.6"/>
  <rect x="452" y="145" width="8" height="110" fill="#3A4A56" opacity="0.6"/>
  
  <rect x="350" y="215" width="60" height="40" fill="#9a9488"/><rect x="354" y="221" width="52" height="28" fill="#ada698" stroke="#9a9488" stroke-width="1"/><rect x="164" y="169" width="28" height="22" fill="#ada698" stroke="#9a9488" stroke-width="1.2"/><line x1="178" y1="169" x2="178" y2="191" stroke="#9a9488" stroke-width="0.8"/>
  
  <!-- Door -->
  <rect x="288" y="219" width="24" height="36" fill="#BDB5A6" stroke="#4ECDC4" stroke-width="2"/>
  
  <!-- Roof -->
  <polygon points="130,145 300,75 470,145" fill="#1C2B35" opacity="0.85"/>
  
  <!-- Wave 1 -->
  <path d="M120 279 Q165 265 210 279 Q255 293 300 279 Q345 265 390 279 Q435 293 480 279" stroke="#4ECDC4" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Wave 2 -->
  <path d="M120 293 Q165 286 210 293 Q255 300 300 293 Q345 286 390 293 Q435 300 480 293" stroke="#4ECDC4" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.35"/>
  
  <!-- Logo mark small -->
