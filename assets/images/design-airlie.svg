  <!-- Label -->
  <rect x="0" y="356" width="600" height="44" fill="#ada698" opacity="0.5"/>
  <text x="20" y="372" font-family="sans-serif" font-size="13" fill="#1C2B35" opacity="0.55" font-weight="600">The Airlie</text>
