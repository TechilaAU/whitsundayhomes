<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480">
  <!-- Sky gradient -->
  <defs>
    <linearGradient id="skyTheJubilee" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C8DEF0"/>
      <stop offset="100%" stop-color="#E8F4FF"/>
    </linearGradient>
    <linearGradient id="shadowTheJubilee" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(0,0,0,0.15)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </linearGradient>
  </defs>
  <rect width="800" height="480" fill="url(#skyTheJubilee)"/>
  <!-- Ground -->
  <rect x="0" y="370" width="800" height="110" fill="#7A9E78"/>
  <rect x="0" y="370" width="800" height="8" fill="#6B8E69"/>
  <!-- Driveway -->
  <polygon points="280,370 340,480 460,480 520,370" fill="#C8C0B0"/>

  <!-- Main body wide -->
  <rect x="60" y="210" width="680" height="160" fill="#E8E0D0" stroke="#1C2B35" stroke-width="2"/>
  <!-- Wide gable roof -->
  <polygon points="40,210 400,100 760,210" fill="#1C2B35" opacity="0.85"/>
  <!-- Feature entry gable -->
  <polygon points="320,210 400,150 480,210" fill="#1C2B35" opacity="0.75"/>
  <!-- Stone feature pillars -->
  <rect x="300" y="210" width="30" height="160" fill="#A89070"/>
  <rect x="470" y="210" width="30" height="160" fill="#A89070"/>
  <rect x="60" y="210" width="30" height="160" fill="#A89070"/>
  <rect x="710" y="210" width="30" height="160" fill="#A89070"/>
  <!-- Dark cladding panels -->
  <rect x="90" y="210" width="210" height="160" fill="#3A4A3A" opacity="0.7"/>
  <rect x="330" y="210" width="140" height="160" fill="#F0E8D8"/>
  <rect x="500" y="210" width="210" height="160" fill="#3A4A3A" opacity="0.7"/>
  <!-- Garage double -->
  <rect x="95" y="240" width="200" height="130" fill="#2A3A2A"/>
  <line x1="95" y1="276" x2="295" y2="276" stroke="#444" stroke-width="1.5"/>
  <line x1="95" y1="312" x2="295" y2="312" stroke="#444" stroke-width="1.5"/>
  <rect x="195" y="240" width="2" height="130" fill="#444"/>
  <!-- Entry door feature -->
  <rect x="356" y="270" width="88" height="100" fill="#1C2B35" rx="2"/>
  <rect x="362" y="276" width="36" height="50" fill="rgba(78,205,196,0.25)" rx="1"/>
  <rect x="402" y="276" width="36" height="50" fill="rgba(78,205,196,0.25)" rx="1"/>
  <!-- Louvres on windows -->
  <rect x="510" y="240" width="80" height="55" fill="#C8D8E8" stroke="#1C2B35" stroke-width="1.5"/>
  <line x1="510" y1="255" x2="590" y2="255" stroke="#1C2B35" stroke-width="0.8"/>
  <line x1="510" y1="268" x2="590" y2="268" stroke="#1C2B35" stroke-width="0.8"/>
  <line x1="510" y1="280" x2="590" y2="280" stroke="#1C2B35" stroke-width="0.8"/>
  <rect x="610" y="240" width="80" height="55" fill="#C8D8E8" stroke="#1C2B35" stroke-width="1.5"/>
  <!-- Timber beam entry feature -->
  <rect x="295" y="208" width="210" height="10" fill="#8A6A40"/>
  <!-- Landscape - native plants -->
  <ellipse cx="180" cy="374" rx="30" ry="12" fill="#4A7A48"/>
  <ellipse cx="600" cy="374" rx="35" ry="14" fill="#4A7A48"/>
  <rect x="350" y="355" width="6" height="16" fill="#5A8A28"/>
  <rect x="420" y="358" width="5" height="14" fill="#5A8A28"/>
  <!-- Wall lights -->
  <polygon points="302,240 310,240 306,255" fill="#F5D76E" opacity="0.9"/>
  <polygon points="492,240 500,240 496,255" fill="#F5D76E" opacity="0.9"/>
  <!-- Brand bar -->
  <rect x="0" y="448" width="800" height="32" fill="#1C2B35" opacity="0.85"/>
  <text x="16" y="468" font-size="10" fill="#4ECDC4" font-weight="700" letter-spacing="2">WHITSUNDAY HOMES</text>
  <text x="784" y="468" font-size="9" fill="rgba(255,255,255,0.5)" text-anchor="end">Artist Impression Only</text>
</svg>