<svg xmlns="http://www.w3.org/2000/svg" width="900" height="600" viewBox="0 0 900 600">
  <rect width="900" height="600" fill="#D4CBBB"/>
  
  <!-- Ground shadow -->
  <ellipse cx="450" cy="395" rx="216" ry="15" fill="#c3baac" opacity="0.4"/>
  
  <!-- House body -->
  <rect x="210" y="218" width="480" height="165" fill="#ada699"/>
  
  <!-- Side posts -->
  <rect x="210" y="218" width="12" height="165" fill="#3A4A56" opacity="0.6"/>
  <rect x="678" y="218" width="12" height="165" fill="#3A4A56" opacity="0.6"/>
  
  <rect x="525" y="323" width="90" height="60" fill="#ada699"/><rect x="529" y="329" width="82" height="48" fill="#c3baac" stroke="#ada699" stroke-width="1"/><rect x="246" y="254" width="42" height="33" fill="#c3baac" stroke="#ada699" stroke-width="1.2"/><line x1="267" y1="254" x2="267" y2="287" stroke="#ada699" stroke-width="0.8"/>
  
  <!-- Door -->
  <rect x="432" y="329" width="36" height="54" fill="#D4CBBB" stroke="#4ECDC4" stroke-width="3"/>
  
  <!-- Roof -->
  <polygon points="195,218 450,113 705,218" fill="#1C2B35" opacity="0.85"/>
  
  <!-- Wave 1 -->
  <path d="M180 419 Q247 398 315 419 Q382 440 450 419 Q517 398 585 419 Q652 440 720 419" stroke="#4ECDC4" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Wave 2 -->
  <path d="M180 440 Q247 430 315 440 Q382 450 450 440 Q517 430 585 440 Q652 450 720 440" stroke="#4ECDC4" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.35"/>
  
  <!-- Logo mark small -->
  <text x="880" y="584" font-family="serif" font-size="15" fill="#1C2B35" opacity="0.2" text-anchor="end">WHITSUNDAY HOMES</text>
  
  <!-- Label -->
  <rect x="0" y="534" width="900" height="66" fill="#c3baac" opacity="0.5"/>
  <text x="20" y="558" font-family="sans-serif" font-size="19" fill="#1C2B35" opacity="0.55" font-weight="600">The Coral — Cannonvale</text>
</svg>