<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480">
  <!-- Sky gradient -->
  <defs>
    <linearGradient id="skyTheWhitsunday" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C8DEF0"/>
      <stop offset="100%" stop-color="#E8F4FF"/>
    </linearGradient>
    <linearGradient id="shadowTheWhitsunday" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(0,0,0,0.15)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </linearGradient>
  </defs>
  <rect width="800" height="480" fill="url(#skyTheWhitsunday)"/>
  <!-- Ground -->
  <rect x="0" y="370" width="800" height="110" fill="#7A9E78"/>
  <rect x="0" y="370" width="800" height="8" fill="#6B8E69"/>
  <!-- Driveway -->
  <polygon points="280,370 340,480 460,480 520,370" fill="#C8C0B0"/>

  <!-- Ground floor -->
  <rect x="100" y="255" width="600" height="115" fill="#F0EBE4" stroke="#1C2B35" stroke-width="2"/>
  <!-- Upper floor -->
  <rect x="120" y="155" width="560" height="100" fill="#E8E2DC" stroke="#1C2B35" stroke-width="2"/>
  <!-- Flat roof upper -->
  <rect x="110" y="148" width="580" height="10" fill="#1C2B35" opacity="0.8"/>
  <!-- Parapet -->
  <rect x="110" y="148" width="580" height="6" fill="#C8C0B0"/>
  <!-- Roof over entry -->
  <polygon points="280,255 400,210 520,255" fill="#1C2B35" opacity="0.75"/>
  <!-- Ground floor garage -->
  <rect x="110" y="285" width="200" height="85" fill="#E0D8CC"/>
  <rect x="115" y="290" width="88" height="75" fill="#1C2B35" opacity="0.8"/>
  <rect x="207" y="290" width="88" height="75" fill="#1C2B35" opacity="0.8"/>
  <!-- Entry void area -->
  <rect x="350" y="255" width="100" height="115" fill="#E8E2D8"/>
  <rect x="365" y="310" width="70" height="60" fill="#1C2B35" rx="1"/>
  <!-- Upper balcony -->
  <rect x="150" y="250" width="100" height="8" fill="#C8C0B0" stroke="#1C2B35" stroke-width="1"/>
  <rect x="550" y="250" width="120" height="8" fill="#C8C0B0" stroke="#1C2B35" stroke-width="1"/>
  <!-- Upper windows -->
  <rect x="140" y="170" width="70" height="55" fill="#BDD8E8" stroke="#1C2B35" stroke-width="1.5"/>
  <line x1="175" y1="170" x2="175" y2="225" stroke="#1C2B35" stroke-width="1"/>
  <rect x="230" y="170" width="70" height="55" fill="#BDD8E8" stroke="#1C2B35" stroke-width="1.5"/>
  <rect x="460" y="170" width="70" height="55" fill="#BDD8E8" stroke="#1C2B35" stroke-width="1.5"/>
  <rect x="550" y="170" width="80" height="55" fill="#BDD8E8" stroke="#1C2B35" stroke-width="1.5"/>
  <line x1="590" y1="170" x2="590" y2="225" stroke="#1C2B35" stroke-width="1"/>
  <!-- Ground floor windows -->
  <rect x="320" y="275" width="60" height="45" fill="#BDD8E8" stroke="#1C2B35" stroke-width="1.5"/>
  <rect x="480" y="275" width="60" height="45" fill="#BDD8E8" stroke="#1C2B35" stroke-width="1.5"/>
  <rect x="560" y="275" width="80" height="45" fill="#BDD8E8" stroke="#1C2B35" stroke-width="1.5"/>
  <line x1="600" y1="275" x2="600" y2="320" stroke="#1C2B35" stroke-width="1"/>
  <!-- Balcony railings upper -->
  <line x1="120" y1="252" x2="680" y2="252" stroke="#1C2B35" stroke-width="2"/>
  <!-- Feature cladding upper -->
  <rect x="330" y="155" width="140" height="100" fill="#C8A882" opacity="0.25"/>
  <!-- Trees -->
  <ellipse cx="70" cy="340" rx="40" ry="55" fill="#3A6A38"/>
  <ellipse cx="730" cy="340" rx="40" ry="55" fill="#3A6A38"/>
  <!-- Brand bar -->
  <rect x="0" y="448" width="800" height="32" fill="#1C2B35" opacity="0.85"/>
  <text x="16" y="468" font-size="10" fill="#4ECDC4" font-weight="700" letter-spacing="2">WHITSUNDAY HOMES</text>
  <text x="784" y="468" font-size="9" fill="rgba(255,255,255,0.5)" text-anchor="end">Artist Impression Only</text>
</svg>