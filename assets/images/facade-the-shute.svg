<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480">
  <!-- Sky gradient -->
  <defs>
    <linearGradient id="skyTheShute" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C8DEF0"/>
      <stop offset="100%" stop-color="#E8F4FF"/>
    </linearGradient>
    <linearGradient id="shadowTheShute" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(0,0,0,0.15)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </linearGradient>
  </defs>
  <rect width="800" height="480" fill="url(#skyTheShute)"/>
  <!-- Ground -->
  <rect x="0" y="370" width="800" height="110" fill="#7A9E78"/>
  <rect x="0" y="370" width="800" height="8" fill="#6B8E69"/>
  <!-- Driveway -->
  <polygon points="280,370 340,480 460,480 520,370" fill="#C8C0B0"/>

  <!-- Main body -->
  <rect x="80" y="200" width="640" height="170" fill="#F0EBE0" stroke="#1C2B35" stroke-width="2"/>
  <!-- Colorbond roof -->
  <polygon points="60,200 400,120 740,200" fill="#1C2B35" opacity="0.9"/>
  <polygon points="60,200 400,120 740,200" fill="none" stroke="#333" stroke-width="2"/>
  <!-- Garage section -->
  <rect x="80" y="240" width="200" height="130" fill="#E8E2D8"/>
  <!-- Garage door -->
  <rect x="90" y="250" width="180" height="110" fill="#1C2B35" rx="2"/>
  <line x1="90" y1="287" x2="270" y2="287" stroke="#333" stroke-width="1" opacity="0.5"/>
  <line x1="90" y1="324" x2="270" y2="324" stroke="#333" stroke-width="1" opacity="0.5"/>
  <!-- Entry door -->
  <rect x="350" y="290" width="50" height="80" fill="#1C2B35" rx="1"/>
  <rect x="355" y="295" width="18" height="35" fill="rgba(78,205,196,0.3)" rx="1"/>
  <rect x="377" y="295" width="18" height="35" fill="rgba(78,205,196,0.3)" rx="1"/>
  <!-- Windows -->
  <rect x="300" y="230" width="60" height="45" fill="#BDD8E8" stroke="#1C2B35" stroke-width="1.5"/>
  <line x1="330" y1="230" x2="330" y2="275" stroke="#1C2B35" stroke-width="1"/>
  <rect x="430" y="230" width="80" height="45" fill="#BDD8E8" stroke="#1C2B35" stroke-width="1.5"/>
  <line x1="470" y1="230" x2="470" y2="275" stroke="#1C2B35" stroke-width="1"/>
  <rect x="540" y="230" width="80" height="45" fill="#BDD8E8" stroke="#1C2B35" stroke-width="1.5"/>
  <!-- Wall lights -->
  <rect x="340" y="285" width="6" height="12" fill="#F5D76E" opacity="0.8"/>
  <rect x="408" y="285" width="6" height="12" fill="#F5D76E" opacity="0.8"/>
  <!-- Feature cladding -->
  <rect x="280" y="200" width="160" height="170" fill="#C8A882" opacity="0.3"/>
  <!-- Eaves -->
  <rect x="55" y="196" width="690" height="8" fill="#E8E2D8" stroke="#1C2B35" stroke-width="1"/>
  <!-- Fascia -->
  <rect x="55" y="192" width="690" height="6" fill="#1C2B35" opacity="0.7"/>
  <!-- Landscape -->
  <ellipse cx="140" cy="372" rx="50" ry="18" fill="#5A8A58"/>
  <ellipse cx="650" cy="372" rx="40" ry="15" fill="#5A8A58"/>
  <!-- Letterbox -->
  <rect x="85" y="355" width="20" height="16" fill="#1C2B35" rx="1"/>
  <!-- Brand bar -->
  <rect x="0" y="448" width="800" height="32" fill="#1C2B35" opacity="0.85"/>
  <text x="16" y="468" font-size="10" fill="#4ECDC4" font-weight="700" letter-spacing="2">WHITSUNDAY HOMES</text>
  <text x="784" y="468" font-size="9" fill="rgba(255,255,255,0.5)" text-anchor="end">Artist Impression Only</text>
</svg>